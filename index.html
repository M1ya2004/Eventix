<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — EventTix</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── LOGIN ── */
    body { margin: 0; padding: 0; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }


    .glass-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('123.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #1a4a50; /* fallback colour */
    }

    /* Glass card */
    .glass-card {
      width: 100%;
      max-width: 420px;
      margin: 20px;
      padding: 44px 38px 36px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.35);
    }

    /* Title */
    .glass-card h2 {
      font-size: 30px;
      font-weight: 600;
      color: #ffffff;
      text-align: center;
      margin-bottom: 34px;
      letter-spacing: 0.02em;
    }

    /* Input row */
    .glass-field {
      position: relative;
      margin-bottom: 22px;
    }
    .glass-field .field-icon {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.65);
      font-size: 17px;
      pointer-events: none;
    }
    .glass-field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid rgba(255,255,255,0.45);
      padding: 10px 36px 10px 30px;
      color: #ffffff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .glass-field input::placeholder { color: rgba(255,255,255,0.55); }
    .glass-field input:focus { border-bottom-color: #ffffff; }

    /* Eye toggle */
    .eye-toggle {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.55);
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .eye-toggle:hover { color: #fff; }

    /* Remember me + Forgot */
    .glass-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      margin-top: 4px;
    }
    .glass-remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      cursor: pointer;
    }
    .glass-remember input[type="checkbox"] {
      width: 14px; height: 14px;
      accent-color: #ffffff;
      cursor: pointer;
    }
    .glass-forgot {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .glass-forgot:hover { color: #ffffff; }

    /* Error */
    .glass-error {
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      padding: 9px 14px;
      margin-bottom: 18px;
      display: none;
      text-align: center;
    }
    .glass-error.show { display: block; }

    /* Login button */
    .glass-btn {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      background: #ffffff;
      color: #1a1a1a;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-bottom: 22px;
    }
    .glass-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    .glass-btn:active  { transform: translateY(0); }
    .glass-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Register link */
    .glass-register {
      text-align: center;
      color: rgba(255,255,255,0.65);
      font-size: 13.5px;
    }
    .glass-register a {
      color: #ffffff;
      font-weight: 600;
      text-decoration: none;
    }
    .glass-register a:hover { text-decoration: underline; }

    /* Demo hint */
    .glass-hint {
      margin-top: 20px;
      background: rgba(255,255,255,0.07);
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12.5px;
      color: rgba(255,255,255,0.55);
      text-align: center;
    }
    .glass-hint strong { color: rgba(255,255,255,0.9); }
  </style>
</head>
<body>

<div class="glass-wrapper">
  <div class="glass-card">

    <!-- Logo -->
    <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:14px">
      <div style="width:42px;height:42px; background: linear-gradient(135deg, #a78bfa, #ec4899);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">&#127903;</div>
      <div style="font-family:'Segoe UI',sans-serif;font-size:20px;font-weight:700;color:#fff">Event<span style="color:#C80965">Tix</span></div>
    </div>

    <!-- Title -->
    <h2>Welcome Back</h2>

    <!-- Subtitle -->
    <p style="text-align:center;color:rgba(255,255,255,0.6);font-size:13.5px;margin-top:-24px;margin-bottom:26px">Sign in to manage events and tickets.</p>

    <!-- Error message -->
    <div class="glass-error" id="loginError">
      ⚠️ Invalid username or password. Please try again.
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>

      <!-- Username / Email -->
      <div class="glass-field">
        <span class="field-icon">👤</span>
        <input
          type="text"
          id="username"
          placeholder="Email"
          autocomplete="username"
          required
        />
      </div>

      <!-- Password -->
      <div class="glass-field">
        <span class="field-icon">🔒</span>
        <input
          type="password"
          id="password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
        <button type="button" class="eye-toggle" id="eyeToggle" title="Toggle password">👁</button>
      </div>

      <!-- Remember me + Forgot password -->
      <div class="glass-row">
        <label class="glass-remember">
          <input type="checkbox" id="rememberMe" />
          Remember me
        </label>
        <a href="#" class="glass-forgot">Forgot Password?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="glass-btn" id="loginBtn">Login</button>

    </form>

    <!-- Register -->
    <div class="glass-register">
      Don't have an account? <a href="#">Register</a>
    </div>

    <!-- Demo hint -->
    <div class="glass-hint">
      Demo: Username <strong>admin</strong> &nbsp;/&nbsp; Password <strong>1234</strong>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
  // Eye toggle — show / hide password
  document.getElementById('eyeToggle').addEventListener('click', function () {
    const pw = document.getElementById('password');
    if (pw.type === 'password') { pw.type = 'text';     this.textContent = '🙈'; }
    else                        { pw.type = 'password'; this.textContent = '👁'; }
  });
</script>

</body>
</html>
